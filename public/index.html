<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芸兒小秘書</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#F7F6F2;--surface:#FFFFFF;--border:#E4E2DA;--border2:#D0CEC4;
  --text:#1A1916;--muted:#7A786E;--hint:#B0AEA6;
  --accent:#3D35A8;--accent-l:#EEEDFE;--accent-m:#7F77DD;
  --success:#0F6E56;--success-l:#E1F5EE;
  --warn:#854F0B;--warn-l:#FAEEDA;
  --danger:#A32D2D;--danger-l:#FCEBEB;
  --info:#185FA5;--info-l:#E6F1FB;
  --radius:10px;--radius-lg:14px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --sidebar-w:220px;--trans:.15s ease;
}
[data-theme="dark"]{
  --bg:#141412;--surface:#1E1D1A;--border:#2E2C28;--border2:#3E3C38;
  --text:#F0EEE8;--muted:#8A8880;--hint:#5A5852;
  --accent:#7F77DD;--accent-l:#26215C;--accent-m:#AFA9EC;
  --success:#1D9E75;--success-l:#04342C;
  --warn:#EF9F27;--warn-l:#412402;
  --danger:#E24B4A;--danger-l:#501313;
  --info:#378ADD;--info-l:#042C53;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

.shell{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}

.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.logo-mark{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.logo-title{font-size:13px;font-weight:500;color:var(--text);display:block}
.logo-sub{font-size:11px;color:var(--hint);display:block;margin-top:1px}
.nav-section{padding:14px 16px 4px;font-size:10px;font-weight:500;color:var(--hint);letter-spacing:.08em;text-transform:uppercase}
.nav-item{margin:1px 8px;padding:7px 10px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background var(--trans),color var(--trans);user-select:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-l);color:var(--accent);font-weight:500}
.nav-item.disabled{opacity:.35;cursor:default;pointer-events:none}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.theme-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background var(--trans)}
.theme-btn:hover{background:var(--bg)}
.theme-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}

.topbar-info{flex:1;min-width:0}
.topbar-title{font-size:15px;font-weight:500;color:var(--text)}
.topbar-date{font-size:11px;color:var(--hint)}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-family:var(--font);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:background var(--trans),border-color var(--trans),transform .1s;white-space:nowrap;font-weight:400}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(.98)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#3028a0;border-color:#3028a0}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:4px 10px;font-size:12px}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--hint);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:26px;font-weight:300;color:var(--text);line-height:1;margin-bottom:2px;font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--muted)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:500;color:var(--text)}

.tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.tg-p{background:var(--accent-l);color:var(--accent)}
.tg-t{background:var(--success-l);color:var(--success)}
.tg-a{background:var(--warn-l);color:var(--warn)}
.tg-b{background:var(--info-l);color:var(--info)}
.tg-d{background:var(--danger-l);color:var(--danger)}

.filter-row{display:flex;gap:4px}
.fpill{padding:3px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:transparent;transition:all var(--trans)}
.fpill:hover{border-color:var(--border2);color:var(--text)}
.fpill.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent);font-weight:500}

/* ── View toggle ── */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.vt-btn{padding:5px 12px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font);display:flex;align-items:center;gap:5px;transition:background var(--trans),color var(--trans)}
.vt-btn:hover{background:var(--bg);color:var(--text)}
.vt-btn.active{background:var(--accent-l);color:var(--accent);font-weight:500}
.vt-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}

/* ── Kanban ── */
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding:16px;min-height:420px}
.kanban-board::-webkit-scrollbar{height:4px}
.kanban-board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.kanban-col{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;margin-bottom:2px}
.kanban-col-title{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.col-dot{width:8px;height:8px;border-radius:50%}
.kanban-count{font-size:11px;color:var(--hint);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-family:var(--mono)}
.kanban-add{padding:6px 8px;border-radius:8px;font-size:12px;color:var(--hint);cursor:pointer;display:flex;align-items:center;gap:4px;transition:background var(--trans),color var(--trans)}
.kanban-add:hover{background:var(--bg);color:var(--muted)}
.kanban-add svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

.kcard{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;cursor:pointer;transition:border-color var(--trans),transform .1s;
  position:relative;
}
.kcard:hover{border-color:var(--border2);transform:translateY(-1px)}
.kcard-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4}
.kcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.kcard-due{font-size:11px;color:var(--hint);font-family:var(--mono)}
.kcard-due.ov{color:var(--danger)}
.priority-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--radius) 0 0 var(--radius)}
.kcard-comments{font-size:11px;color:var(--hint);display:flex;align-items:center;gap:3px}
.kcard-comments svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8}
.drag-over{border-color:var(--accent)!important;background:var(--accent-l)!important}
.drag-ghost{opacity:.4}

/* ── Gantt ── */
.gantt-wrap{padding:0;overflow-x:auto}
.gantt-table{width:100%;border-collapse:collapse;min-width:700px}
.gantt-table th{font-size:11px;font-weight:500;color:var(--hint);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg)}
.gantt-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.gantt-table tr:last-child td{border-bottom:none}
.gantt-table tr:hover td{background:var(--bg)}
.gantt-name-cell{font-size:13px;color:var(--text);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-bar-cell{padding:8px 0}
.gantt-bar-wrap{position:relative;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;margin:0 8px}
.gantt-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;transition:width .4s ease}
.gantt-bar-label{font-size:10px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;font-family:var(--mono)}
.gantt-pct{font-size:12px;font-family:var(--mono);color:var(--muted);text-align:right;width:36px}
.gantt-status{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.st-on{background:var(--success-l);color:var(--success)}
.st-at{background:var(--warn-l);color:var(--warn)}
.st-de{background:var(--danger-l);color:var(--danger)}
.st-dn{background:var(--bg);color:var(--hint);border:1px solid var(--border)}

/* ── Detail panel (slide-in) ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:150;display:flex;justify-content:flex-end;animation:fadein .15s ease}
.detail-panel{width:400px;max-width:95vw;background:var(--surface);height:100%;overflow-y:auto;border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slidepanel .2s ease}
@keyframes slidepanel{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.detail-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
.detail-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
.close-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;transition:background var(--trans)}
.close-btn:hover{background:var(--bg)}
.close-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.detail-body{padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.detail-section{display:flex;flex-direction:column;gap:6px}
.detail-section-title{font-size:11px;font-weight:500;color:var(--hint);text-transform:uppercase;letter-spacing:.06em}
.detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-meta-item{background:var(--bg);border-radius:8px;padding:10px 12px}
.detail-meta-label{font-size:11px;color:var(--hint);margin-bottom:3px}
.detail-meta-val{font-size:13px;font-weight:500;color:var(--text)}

/* progress edit */
.progress-edit{display:flex;align-items:center;gap:10px}
.progress-edit input[type=range]{flex:1;accent-color:var(--accent)}
.progress-edit span{font-size:12px;font-family:var(--mono);color:var(--text);width:32px;text-align:right}

/* Comments */
.comments-list{display:flex;flex-direction:column;gap:10px}
.comment-item{display:flex;gap:8px}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--accent);flex-shrink:0}
.comment-body{flex:1;min-width:0}
.comment-meta{font-size:11px;color:var(--hint);margin-bottom:3px;display:flex;gap:6px}
.comment-author{font-weight:500;color:var(--muted)}
.comment-text{font-size:13px;color:var(--text);line-height:1.5;word-break:break-word}
.comment-add-row{display:flex;gap:8px;margin-top:4px;align-items:flex-end}
.comment-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;resize:none;transition:border-color var(--trans);line-height:1.5}
.comment-input:focus{border-color:var(--accent)}
.comment-input::placeholder{color:var(--hint)}

/* ── Todo styles ── */
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--trans)}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:var(--bg)}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--hint)}
.check-ring{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--trans);cursor:pointer}
.check-ring:hover{border-color:var(--accent)}
.check-ring.checked{background:var(--accent);border-color:var(--accent)}
.check-ring svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity var(--trans)}
.check-ring.checked svg{opacity:1}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ph{background:var(--danger)}.pm{background:var(--warn)}.pl{background:var(--success)}
.todo-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.todo-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.due-txt{font-size:11px;color:var(--hint);white-space:nowrap;font-family:var(--mono)}
.due-ov{color:var(--danger)}
.add-row{padding:10px 16px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--bg)}
.add-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color var(--trans)}
.add-inp:focus{border-color:var(--accent)}
.add-inp::placeholder{color:var(--hint)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadein .12s ease}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px 24px;width:380px;max-width:95vw;animation:slidein .15s ease}
@keyframes slidein{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:15px;font-weight:500;margin-bottom:18px;color:var(--text)}
.form-row{margin-bottom:13px}
.form-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.form-ctrl{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color var(--trans)}
.form-ctrl:focus{border-color:var(--accent)}
.form-ctrl::placeholder{color:var(--hint)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* ── Task accordion ── */
.task-accordion{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);transition:border-color var(--trans)}
.task-accordion:hover{border-color:var(--border2)}
.task-accordion.expanded{border-color:var(--accent-m)}
.task-acc-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;gap:8px;user-select:none}
.task-acc-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.task-acc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.task-acc-title{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-acc-title.done-text{text-decoration:line-through;color:var(--hint)}
.acc-chevron{transition:transform .2s ease;flex-shrink:0;color:var(--hint)}
.task-accordion.expanded .acc-chevron{transform:rotate(180deg)}
.task-comments-block{border-top:1px solid var(--border);background:var(--bg);padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.task-meta-row{display:flex;align-items:center;gap:8px}
.task-select{width:auto;padding:3px 8px;font-size:12px;border-radius:6px;flex-shrink:0}
.inline-comments{display:flex;flex-direction:column;gap:8px}
.no-comment-hint{font-size:12px;color:var(--hint);padding:8px 0;font-style:italic}
.inline-comment{display:flex;gap:8px}
.ic-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--accent);flex-shrink:0}
.ic-body{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.ic-meta{font-size:11px;color:var(--hint);margin-bottom:3px;display:flex;gap:6px}
.ic-author{font-weight:500;color:var(--muted)}
.ic-text{font-size:13px;color:var(--text);line-height:1.5;word-break:break-word}
.inline-add-row{display:flex;gap:8px;align-items:flex-end;margin-top:2px}
.inline-comment-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;resize:none;transition:border-color var(--trans);line-height:1.5;min-height:36px;max-height:120px;overflow-y:auto}
.inline-comment-inp:focus{border-color:var(--accent)}
.inline-comment-inp::placeholder{color:var(--hint)}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Project list ── */
.proj-list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--trans)}
.proj-list-item:last-child{border-bottom:none}
.proj-list-item:hover{background:var(--bg)}
.proj-color-sq{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.proj-list-name{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.proj-list-desc{font-size:12px;color:var(--muted);flex:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-bar-mini{width:80px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;flex-shrink:0}
.proj-bar-mini-fill{height:4px;border-radius:2px}
.proj-pct-mini{font-size:11px;font-family:var(--mono);color:var(--hint);width:28px;text-align:right;flex-shrink:0}

.mic-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--accent);color:#fff;flex-shrink:0}
.mic-btn:hover{transform:scale(1.05)}
.mic-btn.listening{background:var(--danger);animation:pulse 1s ease-in-out infinite}
.mic-btn svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(162,45,45,.4)}50%{box-shadow:0 0 0 12px rgba(162,45,45,0)}}
.voice-transcript{min-height:56px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:14px;color:var(--text);line-height:1.5}
.intent-btn{padding:8px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.intent-btn:hover{border-color:var(--accent);color:var(--accent)}
.intent-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.line-result{padding:14px 16px;border-radius:var(--radius);font-size:13px;line-height:1.6;white-space:pre-line}
.line-ok{background:var(--success-l);color:var(--success)}

/* ═══════════════════ API 資料層 ═══════════════════ */
let _saveTimer = null;
let _saveStatus = 'saved'; // 'saved' | 'saving' | 'error'

async function loadFromServer() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error('server error');
    return await res.json();
  } catch(e) {
    console.warn('無法連線伺服器，使用本機暫存:', e.message);
    return null;
  }
}

function save() {
  // 防抖：500ms 內多次操作只送一次
  clearTimeout(_saveTimer);
  setSaveStatus('saving');
  _saveTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/data', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ todos, projects, notes, settings:{ dark } })
      });
      if(res.ok){ setSaveStatus('saved'); } else { setSaveStatus('error'); }
    } catch(e) {
      setSaveStatus('error');
    }
  }, 500);
}

function setSaveStatus(s) {
  _saveStatus = s;
  const el = document.getElementById('save-status');
  if (!el) return;
  const map = {
    saving: { text:'儲存中…', color:'var(--warn)' },
    saved:  { text:'已儲存', color:'var(--success)' },
    error:  { text:'儲存失敗', color:'var(--danger)' },
  };
  const m = map[s] || map.saved;
  el.textContent = m.text;
  el.style.color = m.color;
}

let todos    = DEFAULT_TODOS;
let projects = DEFAULT_PROJECTS;
let notes    = DEFAULT_NOTES;
let dark     = false;
let view     = 'projects';
let projView = 'list';   // 'list' | 'kanban' | 'gantt'
let todoFilter = 'all';
let selectedProjId = null;
let dragSrc = null;

if(dark) document.documentElement.setAttribute('data-theme','dark');

/* ─── helpers ─── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function $ (id){return document.getElementById(id)}
function updateBadge(){const b=$('badge-todo');const n=todos.filter(t=>!t.done).length;if(b){b.textContent=n;b.style.display=n?'':'none'}}
function statusLabel(s){return{todo:'待處理',in:'進行中',done:'已完成',block:'阻塞中'}[s]||s}
function statusCls(s){return{todo:'tg-p',in:'tg-b',done:'tg-t',block:'tg-d'}[s]||'tg-p'}
function projStatus(p){const s=p.status;return{on:{cls:'st-on',lbl:'進行中'},at:{cls:'st-at',lbl:'注意'},de:{cls:'st-de',lbl:'延遲'},dn:{cls:'st-dn',lbl:'完成'}}[s]||{cls:'st-on',lbl:'進行中'}}
function calcProgress(proj){const t=proj.tasks||[];if(!t.length)return 0;return Math.round(t.filter(x=>x.status==='done').length/t.length*100)}
function priColor(p){return{high:'var(--danger)',med:'var(--warn)',low:'var(--success)'}[p]||'var(--hint)'}

/* ─── Date ─── */
$('view-date').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

/* ─── Theme ─── */
function toggleTheme(){dark=!dark;save();dark?document.documentElement.setAttribute('data-theme','dark'):document.documentElement.removeAttribute('data-theme');updateThemeIcon()}
function updateThemeIcon(){const ic=$('theme-icon');if(!ic)return;ic.innerHTML=dark?'<path d="M13 8A5 5 0 1 1 8 3a3.5 3.5 0 0 0 5 5z"/>':'<path d="M8 2v1M8 13v1M2 8h1M13 8h1M4 4l.7.7M11.3 11.3l.7.7M4 12l.7-.7M11.3 4.7l.7-.7"/><circle cx="8" cy="8" r="3"/>'}
updateThemeIcon();

/* ─── Nav ─── */
function showView(v){
  view=v;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=$('nav-'+v); if(el) el.classList.add('active');
  const titles={todo:'工作待辦清單',projects:'專案管理',calendar:'日曆提醒',notes:'會議 & 課程筆記',voice:'語音小秘書',linesettings:'LINE 設定與推播',personal:'個人日曆',family:'家庭代辦',health:'健康追蹤'};
  $('view-title').textContent=titles[v]||v;
  render();
}

/* ═══════════════════ RENDER ═══════════════════ */
function render(){
  updateBadge();
  const c=$('content'), ta=$('topbar-actions');
  if(view==='todo') renderTodo(c,ta);
  else if(view==='projects') renderProjects(c,ta);
  else if(view==='calendar') renderCalendar(c,ta).catch(()=>{gcalAuth={authed:false};renderCalendarContent();});
  else if(view==='notes') renderNotes(c,ta);
  else if(view==='voice') renderVoice(c,ta);
  else if(view==='linesettings') renderLineSettings(c,ta);
  else if(view==='personal') renderPersonal(c,ta);
  else if(view==='family') renderFamily(c,ta);
  else if(view==='health') renderHealth(c,ta);
}

/* ═══════════════════ PROJECTS ═══════════════════ */
function renderProjects(c,ta){
  // Sync progress from tasks
  projects.forEach(p=>{p.progress=calcProgress(p)});

  const total=projects.length;
  const onTrack=projects.filter(p=>p.status==='on').length;
  const atRisk=projects.filter(p=>p.status==='at'||p.status==='de').length;
  const avgProg=projects.length?Math.round(projects.reduce((a,p)=>a+p.progress,0)/projects.length):0;

  ta.innerHTML=`
  <div class="view-toggle">
    <button class="vt-btn ${projView==='list'?'active':''}" onclick="setProjView('list')">
      <svg viewBox="0 0 13 13"><path d="M1 3h11M1 6.5h11M1 10h11"/></svg>清單
    </button>
    <button class="vt-btn ${projView==='kanban'?'active':''}" onclick="setProjView('kanban')">
      <svg viewBox="0 0 13 13"><rect x="1" y="1" width="3" height="11" rx="1"/><rect x="5" y="1" width="3" height="8" rx="1"/><rect x="9" y="1" width="3" height="9" rx="1"/></svg>看板
    </button>
    <button class="vt-btn ${projView==='gantt'?'active':''}" onclick="setProjView('gantt')">
      <svg viewBox="0 0 13 13"><path d="M1 3h6M1 6.5h9M1 10h5"/></svg>甘特
    </button>
  </div>
  <button class="btn btn-primary" onclick="openAddProject()">
    <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10"/></svg>新增專案
  </button>`;

  if(projView==='list') renderProjList(c,total,onTrack,atRisk,avgProg);
  else if(projView==='kanban') renderKanban(c);
  else if(projView==='gantt') renderGantt(c,total,onTrack,atRisk,avgProg);
}

function setProjView(v){projView=v;render()}

/* ── Project List ── */
function renderProjList(c,total,onTrack,atRisk,avgProg){
  c.innerHTML=`
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">專案總數</div><div class="stat-val">${total}</div><div class="stat-sub">個進行中</div></div>
    <div class="stat-card"><div class="stat-label">正常進行</div><div class="stat-val" style="color:var(--success)">${onTrack}</div><div class="stat-sub" style="color:var(--success)">on track</div></div>
    <div class="stat-card"><div class="stat-label">需要注意</div><div class="stat-val" style="color:var(--warn)">${atRisk}</div><div class="stat-sub" style="color:var(--warn)">at risk</div></div>
    <div class="stat-card"><div class="stat-label">平均進度</div><div class="stat-val">${avgProg}<span style="font-size:14px;color:var(--muted)">%</span></div><div class="stat-sub">所有專案</div></div>
  </div>
  <div class="card">
    <div class="card-head"><span class="card-title">所有專案</span><span style="font-size:11px;color:var(--hint)">點擊查看詳情</span></div>
    <div>
      ${projects.map(p=>{
        const s=projStatus(p);
        return`<div class="proj-list-item" onclick="openProjectDetail(${p.id})" style="position:relative">
          <div class="proj-color-sq" style="background:${p.color}"></div>
          <span class="proj-list-name" style="${p.progress===100?'text-decoration:line-through;color:var(--hint)':''}">${esc(p.name)}</span>
          <span class="proj-list-desc">${esc(p.desc)}</span>
          <span class="tag ${s.cls}" style="font-size:11px">${s.lbl}</span>
          <div class="proj-bar-mini"><div class="proj-bar-mini-fill" style="width:${p.progress}%;background:${p.color}"></div></div>
          <span class="proj-pct-mini">${p.progress}%</span>
          <button class="btn btn-ghost btn-sm" style="padding:3px 6px;color:var(--hint);flex-shrink:0"
            onclick="event.stopPropagation();confirmDeleteProject(${p.id})" title="刪除專案">
            <svg viewBox="0 0 12 12" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
          </button>
        </div>`;}).join('')}
    </div>
  </div>`;
}

/* ── Kanban ── */
function renderKanban(c){
  const allTasks=projects.flatMap(p=>(p.tasks||[]).map(t=>({...t,projectName:p.name,projectColor:p.color,projectId:p.id})));
  const cols=[
    {id:'todo', label:'待處理', color:'#888780'},
    {id:'in',   label:'進行中', color:'#534AB7'},
    {id:'done', label:'已完成', color:'#0F6E56'},
    {id:'block',label:'阻塞中', color:'#A32D2D'},
  ];

  c.innerHTML=`<div class="card" style="overflow:hidden">
  <div class="card-head">
    <span class="card-title">所有專案看板</span>
    <span style="font-size:11px;color:var(--hint)">${allTasks.length} 個任務</span>
  </div>
  <div class="kanban-board" id="kanban-board">
    ${cols.map(col=>{
      const cards=allTasks.filter(t=>t.status===col.id);
      return`<div class="kanban-col" data-col="${col.id}" ondragover="kDragOver(event)" ondrop="kDrop(event,'${col.id}')">

/* ── Drag & Drop ── */
function kDragStart(e, projId, taskId){
  dragSrc={projId,taskId};
  e.currentTarget.classList.add('drag-ghost');
  e.dataTransfer.effectAllowed='move';
}
function kDragEnd(e){
  e.currentTarget.classList.remove('drag-ghost');
  document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));
}
function kDragOver(e){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function kDrop(e, newStatus){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragSrc) return;
  const proj=projects.find(p=>p.id===dragSrc.projId);
  if(!proj) return;
  const task=(proj.tasks||[]).find(t=>t.id===dragSrc.taskId);
  if(task){ task.status=newStatus; save(); render(); }
  dragSrc=null;
}

function submitInlineComment(projId, taskId){
  const inp = $('icinp-'+taskId);
  if(!inp) return;
  const txt = inp.value.trim();
  if(!txt) return;
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  const t = (p.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  t.comments = t.comments||[];
  const now = new Date();
  const timeStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  t.comments.push({id:Date.now(), author:'你', avatar:'你', text:txt, time:timeStr});
  save();
  // re-render just the comment list + input
  const icl = $('icl-'+taskId);
  if(icl) icl.innerHTML = t.comments.map(c=>`
    <div class="inline-comment">
      <div class="ic-avatar">${esc((c.avatar||c.author||'?')[0])}</div>
      <div class="ic-body">
        <div class="ic-meta"><span class="ic-author">${esc(c.author)}</span><span>${esc(c.time)}</span></div>
        <div class="ic-text">${esc(c.text)}</div>
      </div>
    </div>`).join('');
  inp.value=''; inp.style.height='auto';
  // update comment count badge in header
  const acc = $('tacc-'+taskId);
  if(acc){
    const badge = acc.querySelector('.task-acc-right span:last-child');
    if(badge) badge.innerHTML = `<svg viewBox="0 0 12 12" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 1h10v7H7l-2 2-1-2H1z"/></svg> ${t.comments.length}`;
  }

}

function updateTaskStatus(projId,taskId,newStatus){
  const p=projects.find(x=>x.id===projId);
  if(!p) return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);
  if(t){t.status=newStatus;save();}
}
function updateTaskPriority(projId,taskId,pri){
  const p=projects.find(x=>x.id===projId);
  if(!p) return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);
  if(t){t.priority=pri;save();}
}

function submitComment(projId,taskId){
  const inp=$('comment-inp');
  if(!inp) return;
  const txt=inp.value.trim();
  if(!txt) return;
  const p=projects.find(x=>x.id===projId);
  if(!p) return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  t.comments=t.comments||[];
  const now=new Date();
  const timeStr=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  t.comments.push({id:Date.now(),author:'你',avatar:'你',text:txt,time:timeStr});
  save();
  inp.value='';
  // Re-render comments in place
  const cl=$('comments-list');
  if(cl) cl.innerHTML=t.comments.map(c=>`
  <div class="comment-item">
    <div class="comment-avatar">${esc(c.avatar||c.author[0])}</div>
    <div class="comment-body">
      <div class="comment-meta"><span class="comment-author">${esc(c.author)}</span><span>${esc(c.time)}</span></div>
      <div class="comment-text">${esc(c.text)}</div>
    </div>
  </div>`).join('');
  if(inp) inp.focus();
}

function renderTodo(c,ta){

  const total=todos.filter(t=>!t.done).length;

  const overdue=todos.filter(t=>t.overdue&&!t.done).length;
  const done=todos.filter(t=>t.done).length;
  let filtered=[...todos];
  if(todoFilter==='today') filtered=todos.filter(t=>t.due==='今天'||t.due==='昨天');
  else if(todoFilter==='high') filtered=todos.filter(t=>t.priority==='high');
  else if(todoFilter==='done') filtered=todos.filter(t=>t.done);

  c.innerHTML=`
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">待完成</div><div class="stat-val">${total}</div><div class="stat-sub">項任務</div></div>

  </div>
  <div class="card">
    <div class="card-head">
      <span class="card-title">任務清單</span>
      <div class="filter-row">
        <span class="fpill ${todoFilter==='all'?'active':''}" onclick="setTodoFilter('all')">全部</span>
        <span class="fpill ${todoFilter==='today'?'active':''}" onclick="setTodoFilter('today')">今天</span>

        </div>

          <div class="todo-text" style="${t.done?'text-decoration:line-through;color:var(--hint)':''}">${esc(t.text)}</div>

        </div>

}

function submitTodoTask(editId){
  const txt=$('m-text').value.trim();if(!txt)return;
  const tagVal=$('m-tag').value.split('|');
  const dueEl=$('m-due').value;
  const startEl=$('m-start').value;
  const dueStr=dueEl?new Date(dueEl).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'})+'日':'未設定';
  const startStr=startEl?new Date(startEl).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}):'';
  if(editId){
    const t=todos.find(x=>x.id===parseInt(editId)||x.id===editId);
    if(t){
      t.text=txt; t.desc=$('m-desc').value.trim();
      t.priority=$('m-pri').value; t.tag=tagVal[0]; t.tagCls=tagVal[1]||'tg-p';
      t.due=dueStr; t.dueDate=dueEl; t.startDate=startStr;
      t.project=$('m-proj').value;
    }
  } else {
    todos.unshift({id:Date.now(),text:txt,desc:$('m-desc').value.trim(),done:false,
      priority:$('m-pri').value,tag:tagVal[0],tagCls:tagVal[1]||'tg-p',
      due:dueStr,dueDate:dueEl,startDate:startStr,overdue:false,
      project:$('m-proj').value,created:Date.now()});
  }
  save();closeModal();render();
}

async function calCheckAuth(){
  try{

    const tid = setTimeout(()=>controller.abort(), 4000);
    const r = await fetch('/api/auth/status', {signal: controller.signal});
    clearTimeout(tid);
    gcalAuth = await r.json();
  } catch(e){ gcalAuth={authed:false}; }
}

async function calLoadCalendars(){
  try{
    const r = await fetch('/api/calendars');

    const d = await r.json();
    gcalList = d.calendars||[];

async function calLoadEvents(){
  if(!selectedCals.length){ renderCalendarContent(); return; }
  gcalLoading=true; renderCalendarContent();
  try{
    const ids = selectedCals.join(',');
    const controller = new AbortController();
    const tid = setTimeout(()=>controller.abort(), 10000);
    const r = await fetch(`/api/events?cal=${encodeURIComponent(ids)}`, {signal: controller.signal});
    clearTimeout(tid);
    if(r.status===401){ gcalAuth={authed:false}; gcalLoading=false; renderCalendarContent(); return; }
    const d = await r.json();
    gcalEvents = d.events||[];

function calFmtTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function calFmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const evDay = new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff  = Math.round((evDay-today)/(1000*60*60*24));
  if(diff===0) return '今天';
  if(diff===1) return '明天';
  if(diff===2) return '後天';
  return d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric',weekday:'short'});
}
function calIsToday(iso){
  const d=new Date(iso), n=new Date();
  return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
}
function calColorDot(ev){

}

function toggleMic(){
  if (_listening) { stopMic(); return; }
  startMic();
}

function startMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('mic-status').textContent='您的瀏覽器不支援語音辨識，請改用 Chrome'; return; }
  _recognition = new SR();
  _recognition.lang='zh-TW';
  _recognition.interimResults=true;
  _recognition.maxAlternatives=3;
  _recognition.continuous=false;
  _recognition.onstart=()=>{
    _listening=true;
    const btn=document.getElementById('mic-btn');
    const st=document.getElementById('mic-status');
    if(btn) btn.classList.add('listening');
    if(st) st.textContent='聆聽中… 請說出您的指令';
    document.getElementById('voice-transcript').innerHTML='<span style="color:var(--hint)">聆聽中…</span>';
  };
  _recognition.onresult=e=>{
    const text=Array.from(e.results).map(r=>r[0].transcript).join('');
    _transcript=text;
    const el=document.getElementById('voice-transcript');
    if(el) el.textContent=text;
    if(e.results[e.results.length-1].isFinal) parseIntent(text);
  };
  _recognition.onerror=e=>{ stopMic(); const st=document.getElementById('mic-status'); if(st) st.textContent='辨識錯誤：'+e.error; };
  _recognition.onend=()=>{ stopMic(); };
  _recognition.start();
}

function stopMic(){
  _listening=false;
  const btn=document.getElementById('mic-btn');
  const st=document.getElementById('mic-status');
  if(btn) btn.classList.remove('listening');
  if(st) st.textContent='按下麥克風開始說話';
  if(_recognition){ try{_recognition.stop();}catch(e){} _recognition=null; }
}

function parseIntent(text){
  const t=text.toLowerCase();
  const iz=document.getElementById('intent-zone');
  if(!iz) return;
  let intent=null, range=null, addText=null;

  if(/新增|加入|add/.test(t)){
    intent='add_todo';
    addText=text.replace(/^(芸兒)?[，,]?\s*(請|幫我|幫)?\s*(新增|加入|add)\s*/i,'').trim()||text;
  } else if(/今天|today|今日/.test(t)){intent='events';range='today';}
  else if(/明天|tomorrow/.test(t)){intent='events';range='tomorrow';}
  else if(/本週|這週|week/.test(t)){intent='events';range='week';}
  else if(/待辦|todo|任務|task/.test(t)){intent='todos';range=null;}

  if(intent==='add_todo'&&addText){
    const safeText=addText.replace(/'/g,'&#39;');
    iz.innerHTML='<button class="intent-btn" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="sendVoiceQuery(\'add_todo\',null,this.dataset.text)" data-text="'+safeText+'">新增「'+safeText+'」到待辦清單</button>';
    iz.querySelector('button').addEventListener('click',function(){sendVoiceQuery('add_todo',null,addText);});
  } else if(intent){
    const labels={events:{today:'今天行程',tomorrow:'明天行程',week:'本週行程'}};
    const label=intent==='events'?(labels.events[range]||text):'查詢待辦';
    iz.innerHTML=`<button class="intent-btn" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="sendVoiceQuery('${intent}','${range||''}')">
      傳送「${label}」到 LINE
    </button>`;
  } else {
    iz.innerHTML='<span style="font-size:12px;color:var(--hint)">未能辨識。可說：今天行程、明天有什麼、待辦事項、新增 XXX 任務</span>';
  }
}

async function sendVoiceQuery(intent,range,addText){
  const el=document.getElementById('line-result');
  if(el){el.style.display='block';el.className='line-result';el.textContent='傳送中…';}
  try{
    const body={intent,range};
    if(addText) body.text=addText;
    const r=await fetch('/api/voice/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(el){
      if(d.ok){
        if(d.action==='add_todo'){
          el.className='line-result line-ok';
          el.textContent='✓ 已新增待辦事項並傳送到 LINE！\n\n▪ '+addText;
          render();
        } else {
          el.className='line-result line-ok';
          el.textContent='✓ 已傳送到 LINE！\n\n'+(d.message||'');
        }
      } else {
        el.className='line-result line-err';
        el.textContent='✗ '+(d.error||'傳送失敗');
      }
    }
  }catch(e){if(el){el.className='line-result line-err';el.textContent='✗ 連線錯誤：'+e.message;}}
}

async function testLine(){
  const el=document.getElementById('test-result');
  if(el){el.style.display='block';el.style.background='var(--bg)';el.style.color='var(--muted)';el.textContent='傳送測試中…';}
  try{
    const r=await fetch('/api/line/test',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const d=await r.json();
    if(el){
      const ok=d.ok||(d.results&&d.results.some(x=>x.status===200));
      if(ok){el.style.background='var(--success-l)';el.style.color='var(--success)';el.textContent='✓ 成功！請查看您的 LINE';}
      else{
        const detail=JSON.stringify(d.results||d,null,2);
        el.style.background='var(--danger-l)';el.style.color='var(--danger)';el.textContent='✗ 失敗，詳情：'+detail;

    }
  }catch(e){if(el){el.style.background='var(--danger-l)';el.style.color='var(--danger)';el.textContent='✗ 連線錯誤：'+e.message;}}
}

}
function savePersonalData(d){ localStorage.setItem('ys_personal', JSON.stringify(d)); }

function openAddPersonalEvent(date){
  const d = date||new Date().toISOString().split('T')[0];
  openModal(`
  <div class="modal-title">新增家庭行程</div>
  <div class="form-row"><label class="form-label">標題 *</label><input class="form-ctrl" id="pe-title" placeholder="例：看醫生、親師座談"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-row"><label class="form-label">日期</label><input class="form-ctrl" id="pe-date" type="date" value="${d}"></div>
    <div class="form-row"><label class="form-label">時間</label><input class="form-ctrl" id="pe-time" type="time"></div>
  </div>
  <div class="form-row"><label class="form-label">成員</label>
    <select class="form-ctrl" id="pe-member">
      <option value="全家">全家</option>
      ${FAMILY_MEMBERS.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}
    </select>
  </div>
  <div class="form-row"><label class="form-label">備註</label><input class="form-ctrl" id="pe-note" placeholder="選填"></div>
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="submitPersonalEvent()">新增</button>
  </div>`, ()=>$('pe-title')&&$('pe-title').focus());
}

function submitPersonalEvent(){
  const title=$('pe-title').value.trim(); if(!title)return;
  const pdata=readPersonalData();
  if(!pdata.events) pdata.events=[];
  const memberName=$('pe-member').value;
  const memberObj=FAMILY_MEMBERS.find(m=>m.name===memberName)||{color:'#888'};
  pdata.events.push({
    id:Date.now()+'',title,
    date:$('pe-date').value,
    time:$('pe-time').value,
    member:memberName,
    memberColor:memberObj.color,
    note:$('pe-note').value
  });
  savePersonalData(pdata);
  closeModal();
  renderPersonal($('content'),$('topbar-actions'));
}

function deletePersonalEvent(id){
  const pdata=readPersonalData();
  pdata.events=(pdata.events||[]).filter(e=>e.id!==id);
  savePersonalData(pdata);
  renderPersonal($('content'),$('topbar-actions'));
}

function openEditSchedule(kid){
  const m=FAMILY_MEMBERS.find(x=>x.id===kid);
  const pdata=readPersonalData();
  const schedule=(pdata.schedule||{})[kid]||{};
  const days=['一','二','三','四','五'];
  openModal(`
  <div class="modal-title">${m.name} 課表設定</div>
  ${days.map(d=>`
  <div class="form-row">
    <label class="form-label">週${d}</label>
    <input class="form-ctrl" id="sch-${d}" placeholder="例：數學、英文" value="${esc((schedule[d]||[]).join('、'))}">
  </div>`).join('')}
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="submitSchedule('${kid}')">儲存</button>
  </div>`);
}

function submitSchedule(kid){
  const pdata=readPersonalData();
  if(!pdata.schedule) pdata.schedule={};
  const days=['一','二','三','四','五'];
  pdata.schedule[kid]={};
  days.forEach(d=>{
    const val=$('sch-'+d).value.trim();
    pdata.schedule[kid][d]=val?val.split(/[、,，]+/).map(s=>s.trim()).filter(Boolean):[];
  });
  savePersonalData(pdata);
  closeModal();
  renderPersonal($('content'),$('topbar-actions'));
}

  const items=(fd[familyTab]||[]);

  if(familyTab==='shopping'){
    const categories=[...new Set(items.map(i=>i.cat||'其他'))];
    el.innerHTML=`<div class="card">
      <div class="card-head">
        <span class="card-title">購物清單</span>
        <span style="font-size:11px;color:var(--hint)">${items.filter(i=>!i.done).length} 項未購 / ${items.length} 項</span>
      </div>
      ${categories.map(cat=>`
      <div style="padding:8px 16px 0;font-size:11px;font-weight:500;color:var(--hint);text-transform:uppercase;letter-spacing:.05em">${esc(cat)}</div>
      ${items.filter(i=>(i.cat||'其他')===cat).map(i=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:0.5px solid var(--border)">
        <div class="check-ring ${i.done?'checked':''}" onclick="toggleFamilyItem('shopping','${i.id}')">
          <svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
        </div>
        <span style="flex:1;font-size:13px;${i.done?'text-decoration:line-through;color:var(--hint)':'color:var(--text)'}">${esc(i.text)}</span>
        ${i.qty?`<span style="font-size:12px;color:var(--muted)">${esc(i.qty)}</span>`:''}
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteFamilyItem('shopping','${i.id}')">
          <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
        </button>
      </div>`).join('')}`).join('')}
      <div style="padding:10px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;background:var(--bg)">
        <input class="add-inp" id="shop-inp" placeholder="新增商品..." onkeydown="if(event.key==='Enter')quickAddShopping()">
        <button class="btn btn-primary" onclick="quickAddShopping()">新增</button>
      </div>
    </div>
    <div style="text-align:right;margin-top:8px">
      <button class="btn btn-sm" onclick="clearDoneShopping()" style="color:var(--muted)">清除已購項目</button>
    </div>`;
  }

  else if(familyTab==='chores'){
    el.innerHTML=`<div class="card">
      <div class="card-head"><span class="card-title">家事分工</span><span style="font-size:11px;color:var(--hint)">本週</span></div>
      ${items.length===0?'<div style="padding:20px;text-align:center;font-size:13px;color:var(--hint)">尚無家事任務</div>':
        items.map(i=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--border)">
        <div class="check-ring ${i.done?'checked':''}" onclick="toggleFamilyItem('chores','${i.id}')">
          <svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
        </div>
        <span style="flex:1;font-size:13px;${i.done?'text-decoration:line-through;color:var(--hint)':'color:var(--text)'}">${esc(i.text)}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${(FAMILY_MEMBERS.find(m=>m.name===i.assignee)||{color:'#888'}).color}22;color:${(FAMILY_MEMBERS.find(m=>m.name===i.assignee)||{color:'#888'}).color}">${esc(i.assignee||'未指定')}</span>
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteFamilyItem('chores','${i.id}')">
          <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
        </button>
      </div>`).join('')}
      <div style="padding:10px 16px;border-top:0.5px solid var(--border);background:var(--bg);display:flex;gap:8px">
        <input class="add-inp" id="chore-inp" placeholder="新增家事..." onkeydown="if(event.key==='Enter')quickAddChore()">
        <button class="btn btn-primary" onclick="quickAddChore()">新增</button>
      </div>
    </div>`;
  }

  else {
    el.innerHTML=`<div class="card">
      <div class="card-head"><span class="card-title">家庭共用代辦</span></div>
      ${items.length===0?'<div style="padding:20px;text-align:center;font-size:13px;color:var(--hint)">尚無家庭代辦事項</div>':
        items.map(i=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--border)">
        <div class="check-ring ${i.done?'checked':''}" onclick="toggleFamilyItem('todos','${i.id}')">
          <svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
        </div>
        <span style="flex:1;font-size:13px;${i.done?'text-decoration:line-through;color:var(--hint)':'color:var(--text)'}">${esc(i.text)}</span>
        ${i.date?`<span style="font-size:11px;color:var(--hint);font-family:var(--mono)">${esc(i.date)}</span>`:''}
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteFamilyItem('todos','${i.id}')">
          <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
        </button>
      </div>`).join('')}
      <div style="padding:10px 16px;border-top:0.5px solid var(--border);background:var(--bg);display:flex;gap:8px">
        <input class="add-inp" id="ftodo-inp" placeholder="新增家庭代辦..." onkeydown="if(event.key==='Enter')quickAddFamilyTodo()">
        <button class="btn btn-primary" onclick="quickAddFamilyTodo()">新增</button>
      </div>
    </div>`;
  }
}

function toggleFamilyItem(type,id){const fd=readFamilyData();const i=(fd[type]||[]).find(x=>x.id===id);if(i)i.done=!i.done;saveFamilyData(fd);renderFamilyContent();}
function deleteFamilyItem(type,id){const fd=readFamilyData();fd[type]=(fd[type]||[]).filter(x=>x.id!==id);saveFamilyData(fd);renderFamilyContent();}
function quickAddShopping(){const inp=$('shop-inp');const txt=inp.value.trim();if(!txt)return;const fd=readFamilyData();if(!fd.shopping)fd.shopping=[];fd.shopping.push({id:Date.now()+'',text:txt,cat:'其他',done:false});saveFamilyData(fd);inp.value='';renderFamilyContent();}
function quickAddChore(){const inp=$('chore-inp');const txt=inp.value.trim();if(!txt)return;const fd=readFamilyData();if(!fd.chores)fd.chores=[];fd.chores.push({id:Date.now()+'',text:txt,assignee:'',done:false});saveFamilyData(fd);inp.value='';renderFamilyContent();}
function quickAddFamilyTodo(){const inp=$('ftodo-inp');const txt=inp.value.trim();if(!txt)return;const fd=readFamilyData();if(!fd.todos)fd.todos=[];fd.todos.push({id:Date.now()+'',text:txt,done:false});saveFamilyData(fd);inp.value='';renderFamilyContent();}
function clearDoneShopping(){const fd=readFamilyData();fd.shopping=(fd.shopping||[]).filter(i=>!i.done);saveFamilyData(fd);renderFamilyContent();}

function openAddFamilyItem(){
  const tabs={shopping:'購物清單',chores:'家事分工',todos:'家庭代辦'};
  openModal(`
  <div class="modal-title">新增${tabs[familyTab]||'項目'}</div>
  <div class="form-row"><label class="form-label">名稱 *</label><input class="form-ctrl" id="fi-text" placeholder="輸入內容..."></div>
  ${familyTab==='shopping'?`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-row"><label class="form-label">分類</label>
      <select class="form-ctrl" id="fi-cat">
        <option>食品</option><option>清潔用品</option><option>生活用品</option><option>其他</option>
      </select>
    </div>
    <div class="form-row"><label class="form-label">數量</label><input class="form-ctrl" id="fi-qty" placeholder="例：2包"></div>
  </div>`:''}
  ${familyTab==='chores'?`
  <div class="form-row"><label class="form-label">負責人</label>
    <select class="form-ctrl" id="fi-assign">
      <option value="">未指定</option>
      ${FAMILY_MEMBERS.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}
    </select>
  </div>`:''}
  ${familyTab==='todos'?`
  <div class="form-row"><label class="form-label">日期</label><input class="form-ctrl" id="fi-date" type="date"></div>`:''}
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="submitFamilyItem()">新增</button>
  </div>`, ()=>$('fi-text')&&$('fi-text').focus());
}

function submitFamilyItem(){
  const txt=$('fi-text').value.trim(); if(!txt)return;
  const fd=readFamilyData();
  if(!fd[familyTab]) fd[familyTab]=[];
  const item={id:Date.now()+'',text:txt,done:false};
  if(familyTab==='shopping'){item.cat=$('fi-cat')?$('fi-cat').value:'其他';item.qty=$('fi-qty')?$('fi-qty').value:'';}
  if(familyTab==='chores'){item.assignee=$('fi-assign')?$('fi-assign').value:'';}
  if(familyTab==='todos'){item.date=$('fi-date')?$('fi-date').value:'';}
  fd[familyTab].push(item);
  saveFamilyData(fd);
  closeModal();
  renderFamilyContent();
}

/* ═══════════════════ HEALTH TRACKER ═══════════════════ */
function readHealthData(){
  try{ return JSON.parse(localStorage.getItem('ys_health')||'{"weight":[],"exercise":[],"sleep":[],"food":[]}'); }catch(e){ return {weight:[],exercise:[],sleep:[],food:[]}; }
}
function saveHealthData(d){ localStorage.setItem('ys_health',JSON.stringify(d)); }

let healthTab='weight';

function renderHealth(c,ta){
  ta.innerHTML=`<button class="btn btn-primary" onclick="openAddHealthRecord()">
    <svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10"/></svg>新增記錄
  </button>`;
  const tabs=[
    {id:'weight',  label:'體重', icon:'M4 2h8l-1 10H5L4 2zM2 2h2M10 2h2'},
    {id:'exercise',label:'運動', icon:'M8 3a5 5 0 1 1 0 10A5 5 0 0 1 8 3zM8 7v-2M8 7h2'},
    {id:'sleep',   label:'睡眠', icon:'M3 8A5 5 0 1 0 13 8M1 8h14'},
    {id:'food',    label:'飲食', icon:'M5 2v5c0 2 1 3 3 3s3-1 3-3V2M8 10v4'},
  ];
  c.innerHTML=`
  <div style="display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px">
    ${tabs.map(t=>`<button style="flex:1;padding:9px;border:none;font-family:var(--font);font-size:13px;cursor:pointer;background:${healthTab===t.id?'var(--accent-l)':'transparent'};color:${healthTab===t.id?'var(--accent)':'var(--muted)'};font-weight:${healthTab===t.id?500:400};transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px"
      onclick="setHealthTab('${t.id}')">
      <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="${t.icon}"/></svg>
      ${t.label}
    </button>`).join('')}
  </div>
  <div id="health-content"></div>`;
  renderHealthContent();
}

function setHealthTab(t){ healthTab=t; renderHealthContent(); }

function renderHealthContent(){
  const hd=readHealthData();
  const el=$('health-content'); if(!el)return;
  const today=new Date().toISOString().split('T')[0];

  if(healthTab==='weight'){
    const data=(hd.weight||[]).slice(-30).reverse();
    const latest=data[0];
    const prev=data[1];
    const diff=latest&&prev?((latest.value-prev.value).toFixed(1)):null;
    el.innerHTML=`
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-label">最新體重</div><div class="stat-val">${latest?latest.value:'—'}<span style="font-size:14px;color:var(--muted)"> kg</span></div><div class="stat-sub">${latest?latest.date:'尚無記錄'}</div></div>
      <div class="stat-card"><div class="stat-label">較上次</div><div class="stat-val" style="color:${diff>0?'var(--danger)':diff<0?'var(--success)':'var(--text)'}">${diff!==null?(diff>0?'+':'')+diff:'—'}<span style="font-size:14px"> kg</span></div><div class="stat-sub">${diff!==null?(diff>0?'增加':'減少'):'—'}</div></div>
      <div class="stat-card"><div class="stat-label">記錄天數</div><div class="stat-val">${hd.weight.length}</div><div class="stat-sub">累計記錄</div></div>
      <div class="stat-card">
        <div class="stat-label">今日記錄</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <input type="number" id="w-val" step="0.1" placeholder="kg" class="form-ctrl" style="width:80px;padding:5px 8px">
          <button class="btn btn-sm btn-primary" onclick="addWeightRecord()">記錄</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">體重記錄</span></div>
      ${data.length===0?'<div style="padding:20px;text-align:center;font-size:13px;color:var(--hint)">尚無記錄</div>':
        data.slice(0,14).map(r=>`<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:0.5px solid var(--border);gap:12px">
          <span style="font-size:12px;color:var(--hint);font-family:var(--mono);width:80px">${r.date}</span>
          <span style="font-size:15px;font-weight:500;flex:1">${r.value} kg</span>
          ${r.note?`<span style="font-size:12px;color:var(--muted)">${esc(r.note)}</span>`:''}
          <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteHealthRecord('weight','${r.id}')">
            <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
          </button>
        </div>`).join('')}
    </div>`;
  }

  else if(healthTab==='exercise'){
    const data=(hd.exercise||[]).slice(-30).reverse();
    const thisWeek=data.filter(r=>{const d=new Date(r.date),n=new Date();return (n-d)<7*86400000;});
    el.innerHTML=`
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-label">本週運動</div><div class="stat-val">${thisWeek.length}</div><div class="stat-sub">次</div></div>
      <div class="stat-card"><div class="stat-label">本週分鐘</div><div class="stat-val">${thisWeek.reduce((a,r)=>a+(r.duration||0),0)}</div><div class="stat-sub">分鐘</div></div>
      <div class="stat-card"><div class="stat-label">累計記錄</div><div class="stat-val">${hd.exercise.length}</div><div class="stat-sub">次</div></div>
      <div class="stat-card"><div class="stat-label">最近運動</div><div class="stat-val" style="font-size:14px">${data[0]?data[0].type:'—'}</div><div class="stat-sub">${data[0]?data[0].date:'尚無記錄'}</div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">運動記錄</span></div>
      ${data.length===0?'<div style="padding:20px;text-align:center;font-size:13px;color:var(--hint)">尚無記錄</div>':
        data.slice(0,14).map(r=>`<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:0.5px solid var(--border);gap:12px">
          <span style="font-size:12px;color:var(--hint);font-family:var(--mono);width:80px">${r.date}</span>
          <span class="tag tg-t" style="flex-shrink:0">${esc(r.type)}</span>
          <span style="font-size:13px;flex:1">${r.duration?r.duration+'分鐘':''} ${r.steps?r.steps.toLocaleString()+'步':''}</span>
          ${r.note?`<span style="font-size:12px;color:var(--muted)">${esc(r.note)}</span>`:''}
          <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteHealthRecord('exercise','${r.id}')">
            <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
          </button>
        </div>`).join('')}
    </div>`;
  }

  else if(healthTab==='sleep'){
    const data=(hd.sleep||[]).slice(-30).reverse();
    const avg=data.length?Math.round(data.reduce((a,r)=>a+(r.hours||0),0)/data.length*10)/10:0;
    el.innerHTML=`
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-label">平均睡眠</div><div class="stat-val">${avg||'—'}<span style="font-size:14px;color:var(--muted)"> hr</span></div><div class="stat-sub">近30天</div></div>
      <div class="stat-card"><div class="stat-label">昨晚睡眠</div><div class="stat-val">${data[0]?data[0].hours:'—'}<span style="font-size:14px;color:var(--muted)"> hr</span></div><div class="stat-sub">${data[0]?data[0].date:'尚無記錄'}</div></div>
      <div class="stat-card"><div class="stat-label">累計記錄</div><div class="stat-val">${hd.sleep.length}</div><div class="stat-sub">天</div></div>
      <div class="stat-card">
        <div class="stat-label">今日快速記錄</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <input type="number" id="sl-hours" step="0.5" min="0" max="24" placeholder="小時" class="form-ctrl" style="width:70px;padding:5px 8px">
          <button class="btn btn-sm btn-primary" onclick="addSleepRecord()">記錄</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">睡眠記錄</span></div>
      ${data.length===0?'<div style="padding:20px;text-align:center;font-size:13px;color:var(--hint)">尚無記錄</div>':
        data.slice(0,14).map(r=>`<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:0.5px solid var(--border);gap:12px">
          <span style="font-size:12px;color:var(--hint);font-family:var(--mono);width:80px">${r.date}</span>
          <div style="width:60px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="height:6px;border-radius:3px;background:${r.hours>=7?'var(--success)':r.hours>=6?'var(--warn)':'var(--danger)'};width:${Math.min(100,r.hours/9*100)}%"></div></div>
          <span style="font-size:13px;font-weight:500;color:${r.hours>=7?'var(--success)':r.hours>=6?'var(--warn)':'var(--danger)'}">${r.hours} hr</span>
          ${r.bedtime?`<span style="font-size:12px;color:var(--hint)">${r.bedtime}入睡</span>`:''}
          <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteHealthRecord('sleep','${r.id}')">
            <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
          </button>
        </div>`).join('')}
    </div>`;
  }

  else {
    const data=(hd.food||[]).slice(-30).reverse();
    el.innerHTML=`
    <div class="card">
      <div class="card-head"><span class="card-title">飲食日記</span><span style="font-size:11px;color:var(--hint)">${data.length} 筆記錄</span></div>
      ${data.length===0?'<div style="padding:20px;text-align:center;font-size:13px;color:var(--hint)">尚無記錄</div>':
        data.slice(0,14).map(r=>`<div style="padding:10px 16px;border-bottom:0.5px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:13px;font-weight:500">${esc(r.meal)} — ${esc(r.food)}</span>
            <div style="display:flex;align-items:center;gap:8px">
              ${r.cal?`<span style="font-size:12px;color:var(--muted)">${r.cal} kcal</span>`:''}
              <button class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--hint)" onclick="deleteHealthRecord('food','${r.id}')">
                <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 3h8M5 3V2h2v1M4 3v6M8 3v6M3 3l.5 7h5L9 3"/></svg>
              </button>
            </div>
          </div>
          <span style="font-size:11px;color:var(--hint);font-family:var(--mono)">${r.date}</span>
        </div>`).join('')}
    </div>`;
  }
}

function addWeightRecord(){
  const val=parseFloat($('w-val').value);
  if(!val||val<20||val>300){alert('請輸入正確體重（20-300 kg）');return;}
  const hd=readHealthData();
  hd.weight.push({id:Date.now()+'',date:new Date().toISOString().split('T')[0],value:val});
  saveHealthData(hd);
  renderHealthContent();
}

function addSleepRecord(){
  const hrs=parseFloat($('sl-hours').value);
  if(!hrs||hrs<0||hrs>24){alert('請輸入正確睡眠時數');return;}
  const hd=readHealthData();
  if(!hd.sleep)hd.sleep=[];
  hd.sleep.push({id:Date.now()+'',date:new Date().toISOString().split('T')[0],hours:hrs});
  saveHealthData(hd);
  renderHealthContent();
}

function deleteHealthRecord(type,id){
  const hd=readHealthData();
  hd[type]=(hd[type]||[]).filter(r=>r.id!==id);
  saveHealthData(hd);
  renderHealthContent();
}

function openAddHealthRecord(){
  const tabs={weight:'體重',exercise:'運動',sleep:'睡眠',food:'飲食'};
  const today=new Date().toISOString().split('T')[0];
  openModal(`
  <div class="modal-title">新增${tabs[healthTab]||''}記錄</div>
  <div class="form-row"><label class="form-label">日期</label><input class="form-ctrl" id="hr-date" type="date" value="${today}"></div>
  ${healthTab==='weight'?`
  <div class="form-row"><label class="form-label">體重 (kg) *</label><input class="form-ctrl" id="hr-val" type="number" step="0.1" placeholder="例：65.5"></div>
  <div class="form-row"><label class="form-label">備註</label><input class="form-ctrl" id="hr-note" placeholder="選填"></div>`:''}
  ${healthTab==='exercise'?`
  <div class="form-row"><label class="form-label">運動類型 *</label>
    <select class="form-ctrl" id="hr-type">
      <option>跑步</option><option>走路</option><option>騎車</option><option>游泳</option><option>重訓</option><option>瑜珈</option><option>其他</option>
    </select>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-row"><label class="form-label">時間（分鐘）</label><input class="form-ctrl" id="hr-dur" type="number" placeholder="例：30"></div>
    <div class="form-row"><label class="form-label">步數</label><input class="form-ctrl" id="hr-steps" type="number" placeholder="例：8000"></div>
  </div>
  <div class="form-row"><label class="form-label">備註</label><input class="form-ctrl" id="hr-note" placeholder="選填"></div>`:''}
  ${healthTab==='sleep'?`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="form-row"><label class="form-label">睡眠時數 *</label><input class="form-ctrl" id="hr-hours" type="number" step="0.5" placeholder="例：7.5"></div>
    <div class="form-row"><label class="form-label">入睡時間</label><input class="form-ctrl" id="hr-bed" type="time" placeholder="例：23:00"></div>
  </div>`:''}
  ${healthTab==='food'?`
  <div class="form-row"><label class="form-label">餐別</label>
    <select class="form-ctrl" id="hr-meal"><option>早餐</option><option>午餐</option><option>晚餐</option><option>點心</option></select>
  </div>
  <div class="form-row"><label class="form-label">食物內容 *</label><input class="form-ctrl" id="hr-food" placeholder="例：雞胸肉飯、蔬菜"></div>
  <div class="form-row"><label class="form-label">熱量（kcal）</label><input class="form-ctrl" id="hr-cal" type="number" placeholder="例：450"></div>`:''}
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="submitHealthRecord()">儲存</button>
  </div>`);
}

function submitHealthRecord(){
  const hd=readHealthData();
  const date=$('hr-date').value||new Date().toISOString().split('T')[0];
  const id=Date.now()+'';
  if(healthTab==='weight'){
    const val=parseFloat($('hr-val').value);
    if(!val){alert('請輸入體重');return;}
    hd.weight.push({id,date,value:val,note:$('hr-note').value});
  } else if(healthTab==='exercise'){
    hd.exercise.push({id,date,type:$('hr-type').value,duration:parseInt($('hr-dur').value)||0,steps:parseInt($('hr-steps').value)||0,note:$('hr-note').value});
  } else if(healthTab==='sleep'){
    const hrs=parseFloat($('hr-hours').value);
    if(!hrs){alert('請輸入睡眠時數');return;}
    hd.sleep.push({id,date,hours:hrs,bedtime:$('hr-bed').value});
  } else if(healthTab==='food'){
    const food=$('hr-food').value.trim();
    if(!food){alert('請輸入食物內容');return;}
    hd.food.push({id,date,meal:$('hr-meal').value,food,cal:parseInt($('hr-cal').value)||0});
  }
  saveHealthData(hd);
  closeModal();
  renderHealthContent();
}



/* ── 刪除專案 / 任務 ── */
function confirmDeleteProject(projId){
  const p=projects.find(x=>x.id===projId);
  if(!p) return;
  openModal(`
  <div class="modal-title">確認刪除專案</div>
  <div style="padding:12px 0 20px;font-size:13px;color:var(--text)">
    確定要刪除「<strong>${esc(p.name)}</strong>」嗎？<br>
    <span style="color:var(--danger);font-size:12px">此操作無法復原，專案內所有任務也會一併刪除。</span>
  </div>
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="deleteProject(${projId})">確認刪除</button>
  </div>`);
}

function deleteProject(projId){
  projects=projects.filter(x=>x.id!==projId);
  save();
  closeModal();
  closeDetail();
  render();
}

function confirmDeleteTask(projId, taskId){
  const p=projects.find(x=>x.id===projId);
  if(!p) return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  openModal(`
  <div class="modal-title">確認刪除任務</div>
  <div style="padding:12px 0 20px;font-size:13px;color:var(--text)">
    確定要刪除任務「<strong>${esc(t.title)}</strong>」嗎？<br>
    <span style="color:var(--danger);font-size:12px">此操作無法復原，任務內所有討論也會一併刪除。</span>
  </div>
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="deleteTask(${projId},${taskId})">確認刪除</button>
  </div>`);
}

function deleteTask(projId, taskId){
  const p=projects.find(x=>x.id===projId);
  if(!p) return;
  p.tasks=(p.tasks||[]).filter(x=>x.id!==taskId);
  save();
  closeModal();
  // refresh detail panel if open
  if(document.getElementById('detail-mount').innerHTML) openProjectDetail(projId);
  else render();
}

/* ─── Init ─── */
(async () => {
  const data = await loadFromServer();
  if (data) {
    if (data.todos && data.todos.length)    todos    = data.todos;
    if (data.projects && data.projects.length) {
      projects = data.projects.map(p=>{
        if (!p.tasks || p.tasks.length===0) {
          const def = DEFAULT_PROJECTS.find(d=>d.id===p.id);
          if (def) return {...p, tasks:def.tasks, progress:def.progress};
        }
        return p;
      });
    }
    if (data.notes)    notes    = data.notes;
    if (data.settings) {
      dark = !!data.settings.dark;
      if (dark) document.documentElement.setAttribute('data-theme','dark');
      updateThemeIcon();
    }
  }
  // 若資料還是空的，用 DEFAULT 補上
  if (!todos.length) todos = DEFAULT_TODOS;
  if (!projects.length) projects = DEFAULT_PROJECTS;

  // 處理 URL 參數
  const urlParams = new URLSearchParams(window.location.search);
  const authResult = urlParams.get('auth');
  const restored   = urlParams.get('restored');

  if (restored === '1') {
    window.history.replaceState({}, '', '/');
    render();
    setTimeout(()=>{
      const tip = document.createElement('div');
      tip.style.cssText='position:fixed;bottom:20px;right:20px;background:#0F6E56;color:#E1F5EE;padding:12px 20px;border-radius:10px;font-size:13px;z-index:999';
      tip.textContent = '✓ 資料已成功還原！';
      document.body.appendChild(tip);
      setTimeout(()=>tip.remove(), 3000);
    }, 300);
  } else if (authResult === 'success') {
    window.history.replaceState({}, '', '/');
    showView('calendar');
    setTimeout(()=>{
      const tip = document.createElement('div');
      tip.style.cssText='position:fixed;bottom:20px;right:20px;background:#0F6E56;color:#E1F5EE;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;animation:fadein .3s ease';
      tip.textContent = 'Google 帳號授權成功！';
      document.body.appendChild(tip);
      setTimeout(()=>tip.remove(), 3000);
    }, 500);
  } else if (authResult === 'error') {
    window.history.replaceState({}, '', '/');
    const tip = document.createElement('div');
    tip.style.cssText='position:fixed;bottom:20px;right:20px;background:#A32D2D;color:#FCEBEB;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999';
    tip.textContent = '授權失敗，請重試';
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(), 4000);
  } else {
    render();
  }
})();
</script>
